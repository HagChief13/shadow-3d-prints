<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Tienda 3D</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<img class="logo" src="logo.png" alt="Logo">

<div class="barra-superior">

<button id="abrir" class="abrir-menu">
<i class="bi bi-list"></i>
</button>

<form class="busqueda">
<input type="text" placeholder="Buscar productos...">
<button type="submit"><i class="bi bi-search"></i></button>
</form>

<button id="carrito" class="carrito">
<i class="bi bi-cart"></i>
<span class="contador-carrito">0</span>
</button>

</div>

<nav class="nav" id="nav">

<button id="cerrar" class="cerrar-menu">
<i class="bi bi-x-lg"></i>
</button>

<ul class="nav-list">

<li><a href="#" id="btn-inicio">Inicio</a></li>

<li>
<a href="#" id="btn-categorias">Categorías</a>
<ul class="subcategorias" id="subcategorias">
<li><a href="#" data-categoria="hogar">Hogar</a></li>
<li><a href="#" data-categoria="decoracion">Decoración</a></li>
<li><a href="#" data-categoria="utilidad">Utilidad</a></li>
<li><a href="#" data-categoria="llaveros">Llaveros</a></li>
<li><a href="#" data-categoria="figuras">Figuras</a></li>
</ul>
</li>

</ul>
</nav>

</header>

<main>

<section id="inicio">
<div class="producto">
<div class="foto-producto">
<img src="producto3.png">
</div>

<div class="info-producto">
<h2>Bienvenido a nuestra tienda</h2>
<p>Productos 3D personalizados.</p>
</div>
</div>
</section>

<section id="catalogo"></section>

</main>

<footer class="footer">
<p>Contacto: contacto@mitienda.cl</p>
</footer>

<a href="#" class="volver-arriba" id="volverArriba">↑</a>

<!-- SPA CARRITO -->
<div id="spa-carrito" class="spa-carrito">

<div class="spa-contenido">

<h2>Tu carrito</h2>

<div id="spa-lista"></div>

<input id="email-cotizacion" type="email" placeholder="Correo electrónico">

<button id="btn-solicitar" class="btn-final">
Solicitar cotización
</button>

<button id="cerrar-spa">Cerrar</button>

</div>

</div>

<script src="main.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"TU_API",
authDomain:"TU_AUTH",
projectId:"TU_PROJECT"
});
const db = firebase.firestore();
</script>

</body>
</html>
